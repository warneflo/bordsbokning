<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bokningssystem</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0e; --surface: #161616; --surface2: #1e1e1e;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --text: #f0ece4; --muted: #za7570;
  --gold: #c8a96e; --green: #8db89a; --red: #c0614a;
  --r: 8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;background:var(--bg)}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:20px;letter-spacing:.06em;text-transform:uppercase}
.brand-sub{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.clock{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold);font-variant-numeric:tabular-nums}
.topbar-right{display:flex;align-items:center;gap:12px}
.btn-outline{font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;transition:.2s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;transition:.2s;font-size:15px;flex-shrink:0}
.btn-icon:hover{border-color:var(--gold);color:var(--gold)}

/* CALENDAR */
.cal-section{padding:16px 28px 0;border-bottom:1px solid var(--border)}
.month-nav{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.month-label{font-family:'Cormorant Garamond',serif;font-size:17px;letter-spacing:.08em;text-transform:uppercase;min-width:160px;text-align:center}
.nav-btn{width:30px;height:30px;border:1px solid var(--border);border-radius:50%;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.nav-btn:hover{border-color:var(--gold);color:var(--gold)}
.today-btn{font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:6px 12px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--muted);cursor:pointer;transition:.2s;font-family:'DM Sans',sans-serif}
.today-btn:hover{color:var(--gold);border-color:var(--gold)}
.date-stripxdisplay:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding-bottom:0z}
.date-strip::-webkit-scrollbar{display:none}
.date-pill{display:flex;flex-direction:column;align-items:center;padding:8px 12px 10px;border-radius:6px 6px 0 0;cursor:pointer;white-space:nowrap;transition:.15s;border:1px solid transparent;border-bottom:none;min-width:48px;color:var(--muted);font-size:12px;user-select:none}
